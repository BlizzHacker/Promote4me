<!doctype html><meta charset="utf-8"><title>Promote4.me Shopify Beta Add-on</title><style>body{font-family:Arial;padding:30px;max-width:760px;margin:auto}input,button{width:100%;padding:12px;margin:8px 0}button{background:#111827;color:white;border:0;border-radius:10px}</style><h1>Promote4.me Shopify Beta Add-on</h1><p>Test Shopify-style order ingestion.</p><input id="url" value="https://promote4.me"><input id="key" placeholder="Promote4.me External API Key"><input id="order" value="SHOPIFY-TEST-001"><input id="name" value="Shopify Test Customer"><input id="address" value="302 E 4th St, Joplin, MO"><button onclick="send()">Send Shopify Test Order</button><pre id="out"></pre><script>async function send(){const base=url.value.replace(/\/$/,'');const body={source:'Shopify',type:'Package Delivery',title:'Shopify Test Local Delivery',order_number:order.value,customer_name:name.value,address:address.value,status:'Assigned',instructions:'Imported from Shopify beta add-on. Upload delivery proof.'};const r=await fetch(base+'/api/external/orders',{method:'POST',headers:{'Content-Type':'application/json','X-P4ME-Key':key.value},body:JSON.stringify(body)});out.textContent=await r.text();}</script>
